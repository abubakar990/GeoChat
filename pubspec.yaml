name: geochat
description: "GeoChat: Real-Time Proximity-Based Messaging App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.5.0

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # Security
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

  # State & Navigation
  provider: ^6.1.2
  go_router: ^13.2.0

  # Media
  image_picker: ^1.2.1
  cached_network_image: ^3.3.1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.2
  intl: ^0.19.0
  uuid: ^4.4.0
  timeago: ^3.6.1
  http: ^1.2.1

  # Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon/geochat_icon.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/icon/geochat_icon.png"
  min_sdk_android: 21
